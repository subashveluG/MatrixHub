<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatrixHub | Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="index.css">

    <style>
        body {
            background: radial-gradient(circle at center, #1a1c29 0%, #09090b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .back-home {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-size: 1.5rem;
            color: var(--text-secondary);
            z-index: 100;
        }

        .back-home:hover {
            color: var(--text-primary);
        }

        /* Abstract glowing spheres in background */
        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            animation: float 10s ease-in-out infinite alternate;
        }

        .sphere-1 {
            width: 400px;
            height: 400px;
            background: rgba(59, 130, 246, 0.4);
            top: -100px;
            left: -100px;
        }

        .sphere-2 {
            width: 300px;
            height: 300px;
            background: rgba(168, 85, 247, 0.4);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(30px, 50px);
            }
        }

        /* The Custom Auth Container */
        .auth-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--border-radius-lg);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            width: 900px;
            max-width: 100%;
            min-height: 550px;
            z-index: 10;
        }

        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .sign-in-container {
            left: 0;
            width: 50%;
            z-index: 2;
        }

        /* Start off hidden for sign up */
        .sign-up-container {
            left: 0;
            width: 50%;
            opacity: 0;
            z-index: 1;
        }

        /* Active states triggered by JS class '.right-panel-active' */
        .auth-container.right-panel-active .sign-in-container {
            transform: translateX(100%);
            opacity: 0;
        }

        .auth-container.right-panel-active .sign-up-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: show 0.6s;
        }

        @keyframes show {

            0%,
            49.99% {
                opacity: 0;
                z-index: 1;
            }

            50%,
            100% {
                opacity: 1;
                z-index: 5;
            }
        }

        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.6s ease-in-out;
            z-index: 100;
        }

        .auth-container.right-panel-active .overlay-container {
            transform: translateX(-100%);
        }

        .overlay {
            background: linear-gradient(135deg, var(--accent-color), #8b5cf6);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: 0 0;
            color: #ffffff;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .auth-container.right-panel-active .overlay {
            transform: translateX(50%);
        }

        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 50%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .overlay-left {
            transform: translateX(-20%);
        }

        .auth-container.right-panel-active .overlay-left {
            transform: translateX(0);
        }

        .overlay-right {
            right: 0;
            transform: translateX(0);
        }

        .auth-container.right-panel-active .overlay-right {
            transform: translateX(20%);
        }

        /* Forms Styling */
        form h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .social-container {
            margin: 1.5rem 0;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .social-container a {
            border: 1px solid var(--surface-border);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin: 0 5px;
            height: 48px;
            width: 48px;
            font-size: 1.5rem;
            background: rgba(255, 255, 255, 0.05);
        }

        .social-container a:hover {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--surface-border);
            padding: 12px 15px;
            margin: 8px 0;
            width: 100%;
            border-radius: var(--border-radius-sm);
            color: var(--text-primary);
            font-family: inherit;
            transition: all 0.2s;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            width: 100%;
            margin: 8px 0;
            gap: 10px;
        }

        .checkbox-container input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--surface-border);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .checkbox-container input[type="checkbox"]:checked {
            background: var(--accent-color);
            border-color: var(--accent-color);
        }

        .checkbox-container input[type="checkbox"]:checked::after {
            content: '\2714';
            font-size: 12px;
            color: white;
            position: absolute;
        }

        .checkbox-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            user-select: none;
            cursor: pointer;
        }

        .checkbox-label a {
            color: var(--accent-color);
            text-decoration: underline;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.1);
        }

        button {
            border-radius: var(--border-radius-pill);
            border: 1px solid var(--accent-color);
            background-color: var(--accent-color);
            color: #ffffff;
            font-size: 1rem;
            font-weight: bold;
            padding: 12px 45px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: transform 80ms ease-in;
            margin-top: 1rem;
            cursor: pointer;
            width: 100%;
        }

        button:active {
            transform: scale(0.95);
        }

        button:focus {
            outline: none;
        }

        button.ghost {
            background-color: transparent;
            border-color: #ffffff;
            width: auto;
        }

        p.form-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 1rem;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .auth-container {
                min-height: 800px;
                display: flex;
                flex-direction: column;
            }

            .sign-in-container,
            .sign-up-container {
                width: 100%;
                height: 50%;
            }

            .sign-up-container {
                top: 50%;
                left: 0;
                opacity: 1;
                z-index: 1;
            }

            .overlay-container {
                display: none;
                /* Hide complex sliding overlay on mobile, rely on stacked forms or a simple toggle. This is a quick fallback. */
            }

            .auth-container {
                overflow-y: auto;
            }

            /* Simplified mobile view without JS slider */
        }
    </style>
    <link rel="icon" href="favicon.png">
</head>

<body>

    <a href="home1.html" class="back-home"><i class="ph ph-arrow-left"></i> Home1</a>

    <div class="glow-sphere sphere-1"></div>
    <div class="glow-sphere sphere-2"></div>

    <div class="auth-container" id="container">

        <!-- Sign Up Form -->
        <div class="form-container sign-up-container">
            <form action="#">
                <h1>Create Account</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="ph ph-google-logo"></i></a>
                    <a href="#" class="social"><i class="ph ph-github-logo"></i></a>
                    <a href="#" class="social"><i class="ph ph-apple-logo"></i></a>
                </div>
                <span
                    style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 0.5rem; display: block; text-align: center;">or
                    use your email for registration</span>
                <input type="text" placeholder="Name" class="input-field" />
                <input type="email" placeholder="Email" class="input-field" />
                <input type="password" placeholder="Password" class="input-field" required />
                <div class="checkbox-container">
                    <input type="checkbox" id="termsCheckbox" required>
                    <label for="termsCheckbox" class="checkbox-label">I agree to the <a href="#">Terms &
                            Conditions</a></label>
                </div>
                <button type="submit">Sign Up</button>
            </form>
        </div>

        <!-- Sign In Form -->
        <div class="form-container sign-in-container">
            <form action="#">
                <h1>Sign in</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="ph ph-google-logo"></i></a>
                    <a href="#" class="social"><i class="ph ph-github-logo"></i></a>
                    <a href="#" class="social"><i class="ph ph-apple-logo"></i></a>
                </div>
                <span
                    style="color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 0.5rem; display: block; text-align: center;">or
                    use your account</span>
                <input type="email" placeholder="Email" class="input-field" />
                <input type="password" placeholder="Password" class="input-field" required />
                <div class="checkbox-container">
                    <input type="checkbox" id="rememberMe">
                    <label for="rememberMe" class="checkbox-label">Remember Me</label>
                </div>
                <a href="#"
                    style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.5rem; display: block; text-align: right; width: 100%;">Forgot
                    your password?</a>
                <button type="submit">Sign In</button>
            </form>
        </div>

        <!-- The Sliding Overlay Panel -->
        <div class="overlay-container desktop-only">
            <div class="overlay">
                <!-- Overlay Left (Visible when on Sign Up form, prompts to Sign In) -->
                <div class="overlay-panel overlay-left">
                    <h1 style="font-size: 3rem; margin-bottom: 1rem;">Welcome Back!</h1>
                    <p style="font-size: 1.1rem; margin-bottom: 2rem;">To keep connected with us please login with your
                        personal info</p>
                    <button class="ghost" id="signIn">Sign In</button>
                </div>

                <!-- Overlay Right (Visible when on Sign In form, prompts to Sign Up) -->
                <div class="overlay-panel overlay-right">
                    <h1 style="font-size: 3rem; margin-bottom: 1rem;">Hello, Explorer!</h1>
                    <p style="font-size: 1.1rem; margin-bottom: 2rem;">Enter your personal details and start your
                        journey with us</p>
                    <button class="ghost" id="signUp">Sign Up</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');

        signUpButton.addEventListener('click', () => {
            container.classList.add("right-panel-active");
        });

        signInButton.addEventListener('click', () => {
            container.classList.remove("right-panel-active");
        });
    </script>
</body>

</html>
